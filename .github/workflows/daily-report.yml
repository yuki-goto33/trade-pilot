name: daily-report

on:
  schedule:
    # UTC 22:00 = JST 翌朝 7:00。JST 月〜金の朝に配信するため UTC の日〜木に起動する。
    # 注意: GitHub Actions の cron は数分〜数十分の起動遅延がある（README 参照）。
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python poc/poc5_daily_report/run_daily.py

      - name: Commit history
        # Slack 送信失敗等で前ステップが exit 1 でも、生成済みの履歴は残す。
        # docs/reports は GitHub Pages（main /docs）で配信するリッチ版 HTML
        if: ${{ !cancelled() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898024+github-actions[bot]@users.noreply.github.com"
          git add poc/poc5_daily_report/signals_history poc/poc5_daily_report/reports_history docs
          if git diff --cached --quiet; then
            echo "変更なし（コミットをスキップ）"
          else
            git commit -m "chore(poc5): daily report $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
